version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    assignees:
      - tony-stark-eth

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    assignees:
      - tony-stark-eth

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    assignees:
      - tony-stark-eth
